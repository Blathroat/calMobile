plugins {
    id 'com.android.application'
}

android {
    namespace 'com.example.calmobile'
    compileSdk 30

    defaultConfig {
        applicationId 'com.example.calmobile'
        minSdk 23
        targetSdk 30
        versionCode 1
        versionName '0.1.0'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    testImplementation 'junit:junit:4.13.2'
}
